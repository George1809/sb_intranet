{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div class="page-shell">
    <section class="page-hero">
        <p class="eyebrow">Intranet SmartBill</p>
        <h1>{{ page.title }}</h1>

        {% if page.intro %}
            <p class="page-intro">{{ page.intro }}</p>
        {% endif %}
    </section>

    <div class="card-grid">
        {% for child in children %}
            <a class="content-card" href="{% pageurl child %}">
                <span>{{ child.title }}</span>
            </a>
        {% empty %}
            <p class="empty-state">Nu exista pagini create.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
